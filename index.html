<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#0f1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="موارد بشرية">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-an-192.png">
<link rel="icon" type="image/png" href="./icon-an-192.png">
<title>منصة الإدارة الاستراتيجية للموارد البشرية</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--sw:248px;--bg:#0f1117;--bg2:#161b26;--bg3:#1e2535;--bg4:#242d40;--brd:#2a3347;--tx:#e8ecf4;--tx2:#8b97b0;--tx3:#5a6478;--ac:#4f7ef8;--ac2:#3d63d4;--gr:#22c778;--am:#f5a623;--rd:#f04e4e;--pu:#a78bfa;--tl:#2dd4bf;--pk:#f472b6}
html[lang=ar]{font-family:'Cairo',sans-serif}
html[lang=en]{font-family:'Inter',sans-serif}
body{background:var(--bg);color:var(--tx);display:flex;height:100vh;overflow:hidden;font-size:14px}
#sb{width:var(--sw);background:var(--bg2);display:flex;flex-direction:column;flex-shrink:0;transition:width .25s;border-inline-end:1px solid var(--brd);overflow:hidden}
#sb.closed{width:0}
.sb-inner{width:var(--sw);display:flex;flex-direction:column;height:100%;overflow-y:auto}
.brand{padding:14px 12px 10px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--brd);flex-shrink:0}
.brand-ic{width:30px;height:30px;background:var(--ac);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;flex-shrink:0}
.brand-tx{font-size:12px;font-weight:700;line-height:1.3}
.brand-sub{font-size:10px;color:var(--tx2)}
.lr{display:flex;gap:3px;padding:8px 10px 5px;flex-shrink:0}
.lb{flex:1;padding:5px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--brd);background:var(--bg3);color:var(--tx2);border-radius:5px;transition:all .15s;font-family:inherit}
.lb.on{background:var(--ac);border-color:var(--ac);color:#fff}
.ng{padding:8px 7px 3px}
.ng-l{font-size:9.5px;font-weight:700;color:var(--tx3);padding:0 7px 4px;letter-spacing:.4px}
.ni{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:5px;cursor:pointer;color:var(--tx2);font-size:12px;transition:all .15s;white-space:nowrap}
.ni:hover{background:var(--bg3);color:var(--tx)}
.ni.on{background:var(--bg4);color:var(--ac)}
.ni i{font-size:14px;flex-shrink:0}
.ai-badge{font-size:9px;background:rgba(79,126,248,.2);color:var(--ac);border-radius:3px;padding:1px 4px;margin-inline-start:auto;font-weight:700;flex-shrink:0}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#tb{padding:10px 16px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);gap:8px;flex-shrink:0}
.tb-l{display:flex;align-items:center;gap:8px}
#tog{background:var(--bg3);border:1px solid var(--brd);border-radius:6px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2);transition:all .15s;flex-shrink:0}
#tog:hover{background:var(--bg4);color:var(--tx)}
#pg-t{font-size:14px;font-weight:700}
.tb-r{display:flex;align-items:center;gap:7px;flex-shrink:0}
.bdg{background:var(--bg3);border:1px solid var(--brd);border-radius:20px;padding:3px 9px;font-size:10px;color:var(--tx2)}
.aib{background:var(--ac);color:#fff;border:none;border-radius:5px;padding:5px 11px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit}
.aib:hover{background:var(--ac2)}
#ct{flex:1;overflow-y:auto;padding:18px}

/* LAYOUT */
.ph{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.ph-ic{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.ph h2{font-size:15px;font-weight:700}
.ph p{font-size:11px;color:var(--tx2)}
.wlc{background:var(--bg3);border:1px solid var(--brd);border-radius:10px;padding:18px;margin-bottom:16px}
.wlc h2{font-size:17px;font-weight:700;margin-bottom:3px}
.wlc p{color:var(--tx2);font-size:12px}
.mtr{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.mc{background:var(--bg2);border:1px solid var(--brd);border-radius:9px;padding:12px}
.mc-l{font-size:10px;color:var(--tx3);margin-bottom:5px}
.mc-v{font-size:19px;font-weight:700}
.mc-s{font-size:10px;color:var(--tx2);margin-top:2px}
.mg{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.mcd{background:var(--bg2);border:1px solid var(--brd);border-radius:9px;padding:12px;cursor:pointer;transition:all .2s}
.mcd:hover{border-color:var(--ac);background:var(--bg3)}
.mcd-i{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;margin-bottom:7px;font-size:16px}
.mcd h4{font-size:12px;font-weight:700;margin-bottom:2px}
.mcd p{font-size:10px;color:var(--tx2);line-height:1.5}
.tg{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:12px}
.tg.one{grid-template-columns:1fr}
.tc{background:var(--bg2);border:1px solid var(--brd);border-radius:9px;padding:13px}
.tc h4{font-size:12px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.tc p{font-size:11px;color:var(--tx2);margin-bottom:9px;line-height:1.5}
.btn{background:var(--bg3);border:1px solid var(--brd);border-radius:5px;padding:5px 11px;font-size:11px;color:var(--tx);cursor:pointer;transition:all .15s;font-family:inherit}
.btn:hover{background:var(--bg4);border-color:var(--ac);color:var(--ac)}
.btn.pr{background:var(--ac);border-color:var(--ac);color:#fff}
.btn.pr:hover{background:var(--ac2)}
.fl{margin-bottom:10px}
.fl label{font-size:11px;color:var(--tx2);margin-bottom:4px;display:block}
.fi,.fs,.fta{width:100%;background:var(--bg3);border:1px solid var(--brd);border-radius:5px;padding:7px 9px;color:var(--tx);font-size:12px;outline:none;font-family:inherit}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--ac)}
.fs option{background:var(--bg3)}
.fta{resize:vertical;min-height:70px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.tabs{display:flex;gap:3px;margin-bottom:12px;background:var(--bg2);border:1px solid var(--brd);border-radius:7px;padding:3px;flex-wrap:wrap}
.tab{padding:5px 10px;border-radius:5px;font-size:11px;cursor:pointer;color:var(--tx2);transition:all .15s;font-family:inherit;white-space:nowrap}
.tab.on{background:var(--bg4);color:var(--tx)}
.out{margin-top:10px;background:var(--bg3);border-radius:7px;padding:11px;font-size:12px;line-height:1.8;color:var(--tx2);display:none}
.thk{color:var(--tx3);font-size:11px;font-style:italic}

/* ADVISOR CHAT */
.adv-wrap{display:flex;flex-direction:column;height:calc(100vh - 140px);gap:10px}
.adv-header{background:var(--bg2);border:1px solid var(--brd);border-radius:9px;padding:13px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.adv-ic{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.adv-name{font-size:13px;font-weight:700}
.adv-desc{font-size:11px;color:var(--tx2);margin-top:2px}
.adv-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.adv-tag{font-size:10px;background:var(--bg3);border:1px solid var(--brd);border-radius:4px;padding:2px 7px;color:var(--tx2)}
.chat-a{flex:1;background:var(--bg2);border:1px solid var(--brd);border-radius:9px;overflow-y:auto;padding:13px;display:flex;flex-direction:column;gap:10px;min-height:0}
.msg{max-width:90%;padding:9px 12px;border-radius:9px;font-size:12px;line-height:1.7}
.msg.u{background:var(--ac);color:#fff;align-self:flex-start;border-radius:9px 9px 9px 2px}
.msg.a{background:var(--bg3);align-self:flex-end;border-radius:9px 9px 2px 9px}
html[dir=ltr] .msg.u{align-self:flex-end;border-radius:9px 9px 2px 9px}
html[dir=ltr] .msg.a{align-self:flex-start;border-radius:9px 9px 9px 2px}
.msg .ml{font-size:9px;color:var(--tx3);margin-bottom:3px;font-weight:700}
.cin{display:flex;gap:7px;flex-shrink:0}
.cin input{flex:1;background:var(--bg2);border:1px solid var(--brd);border-radius:7px;padding:8px 11px;color:var(--tx);font-size:12px;outline:none;font-family:inherit}
.cin input:focus{border-color:var(--ac)}
.cin button{background:var(--ac);border:none;border-radius:7px;padding:8px 13px;color:#fff;cursor:pointer}
.qsugg{display:flex;flex-wrap:wrap;gap:5px;flex-shrink:0}
.qs{background:var(--bg2);border:1px solid var(--brd);border-radius:6px;padding:5px 9px;font-size:11px;color:var(--tx2);cursor:pointer;transition:all .15s;font-family:inherit}
.qs:hover{border-color:var(--ac);color:var(--ac)}

/* OTHER */
.sct{width:100%;border-collapse:collapse;font-size:11px}
.sct th{text-align:inherit;padding:7px 9px;background:var(--bg3);color:var(--tx3);font-weight:600;border-bottom:1px solid var(--brd)}
.sct td{padding:7px 9px;border-bottom:1px solid var(--brd);color:var(--tx)}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-inline-end:4px}
.dg{background:var(--gr)}.da{background:var(--am)}.dr{background:var(--rd)}
.prb{background:var(--bg3);border-radius:3px;height:5px;margin-top:5px}
.prf{height:5px;border-radius:3px;background:var(--ac)}
.dl{list-style:none}
.dl li{font-size:11px;color:var(--tx2);padding:3px 0;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:5px}
.dl li i{font-size:11px;color:var(--ac)}
.nb{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:9px}
.nbc{background:var(--bg3);border:1px solid var(--brd);border-radius:5px;padding:9px;min-height:82px;cursor:pointer;transition:all .15s}
.nbc:hover{border-color:var(--ac)}
.nbc-t{font-size:9px;color:var(--tx3);margin-bottom:4px}
.nbc-l{font-size:10px;font-weight:700;color:var(--ac);margin-top:4px}
.org-b{background:var(--bg3);border:1px solid var(--brd);border-radius:7px;padding:8px 11px;text-align:center;font-size:11px}
.org-ln{width:2px;height:16px;background:var(--brd);margin:0 auto}
.org-rw{display:flex;gap:5px;justify-content:center}
.org-rw .org-b{flex:1;max-width:120px;font-size:10px}
.stg-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.stg{flex:1;min-width:80px;background:var(--bg3);border-radius:7px;padding:8px;text-align:center;font-size:10px}
.stg-ico{font-size:16px;margin-bottom:2px}
.stg h5{font-weight:700;font-size:11px}
.stg p{color:var(--tx3);font-size:10px;margin-top:1px}
.cg{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.cc{background:var(--bg2);border:1px solid var(--brd);border-radius:9px;padding:13px}
.cb{font-size:20px;font-weight:900;margin-bottom:6px}
.cb-b{color:var(--ac)}.cb-g{color:var(--gr)}.cb-a{color:var(--am)}
.cc h4{font-size:12px;font-weight:700;margin-bottom:4px}
.cc p{font-size:10px;color:var(--tx2);line-height:1.5;margin-bottom:7px}
.band-out{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:9px}
.bc{background:var(--bg4);border-radius:5px;padding:9px;text-align:center}
.bc .bl{font-size:9px;color:var(--tx3)}
.bc .bv{font-size:14px;font-weight:700;color:var(--tx)}
.bc .bv.m{color:var(--ac)}
.ic-b{background:rgba(79,126,248,.15);color:var(--ac)}
.ic-g{background:rgba(34,199,120,.15);color:var(--gr)}
.ic-a{background:rgba(245,166,35,.15);color:var(--am)}
.ic-p{background:rgba(167,139,250,.15);color:var(--pu)}
.ic-t{background:rgba(45,212,191,.15);color:var(--tl)}
.ic-r{background:rgba(240,78,78,.15);color:var(--rd)}
.ic-pk{background:rgba(244,114,182,.15);color:var(--pk)}

/* AI TOOLS GRID */
.ai-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px}
.ai-card{background:var(--bg2);border:1px solid var(--brd);border-radius:9px;padding:13px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:6px}
.ai-card:hover{border-color:var(--ac);background:var(--bg3)}
.ai-card-top{display:flex;align-items:center;gap:9px}
.ai-card-ic{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ai-card h4{font-size:12px;font-weight:700}
.ai-card p{font-size:10px;color:var(--tx2);line-height:1.5}
.ai-card .atag{font-size:9px;background:rgba(79,126,248,.15);color:var(--ac);border-radius:3px;padding:1px 5px;font-weight:700;display:inline-block}
@media(max-width:600px){.aib{padding:5px 7px}.aib span{display:none}.bdg{display:none}#tb{padding:8px}.fr{grid-template-columns:1fr}.tg{grid-template-columns:1fr}.mg{grid-template-columns:1fr 1fr}.mtr{grid-template-columns:1fr 1fr}}
.dl-btns{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}
.pdf-btn{background:#e53e3e;color:#fff;border:none;border-radius:6px;padding:6px 13px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit;transition:all .15s}
.pdf-btn:hover{background:#c53030}
.xls-btn{background:#22c778;color:#fff;border:none;border-radius:6px;padding:6px 13px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit;transition:all .15s}
.xls-btn:hover{background:#16a35a}
.adv-pdf-btn{background:transparent;border:1px solid var(--brd);color:var(--tx3);border-radius:4px;padding:3px 8px;font-size:10px;cursor:pointer;font-family:inherit;margin-top:5px;display:inline-flex;align-items:center;gap:3px;transition:all .15s}
.adv-pdf-btn:hover{border-color:var(--ac);color:var(--ac)}
.bud-sec{background:var(--bg2);border:1px solid var(--brd);border-radius:9px;padding:14px;margin-bottom:10px}
.bud-sec h4{font-size:12px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px;color:var(--tx)}
.bud-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:8px 0}
.bud-field{display:flex;flex-direction:column;gap:4px}
.bud-field label{font-size:10px;color:var(--tx2)}
.bud-field input,.bud-field select{width:100%;background:var(--bg3);border:1px solid var(--brd);border-radius:5px;padding:6px 8px;color:var(--tx);font-size:12px;outline:none;font-family:inherit}
.bud-field input:focus,.bud-field select:focus{border-color:var(--ac)}
.bud-add-row{display:flex;align-items:center;gap:7px;margin-top:6px}
.bud-add-row input{flex:1;background:var(--bg3);border:1px solid var(--brd);border-radius:5px;padding:5px 8px;color:var(--tx);font-size:11px;font-family:inherit}
.bud-custom-rows{margin-top:6px;display:flex;flex-direction:column;gap:4px}
.bud-custom-row{display:flex;align-items:center;gap:6px;font-size:11px;background:var(--bg4);border-radius:4px;padding:4px 8px}
.bud-custom-row button{background:none;border:none;color:var(--rd);cursor:pointer;font-size:12px;padding:0}
.bud-total-box{background:linear-gradient(135deg,rgba(79,126,248,.15),rgba(45,212,191,.1));border:1px solid var(--ac);border-radius:10px;padding:16px;text-align:center;margin:12px 0}
.bud-total-label{font-size:11px;color:var(--tx2);margin-bottom:4px}
.bud-total-num{font-size:32px;font-weight:700;color:var(--ac)}
.bud-total-sub{font-size:12px;color:var(--tx3);margin-top:4px}
.bud-breakdown{background:var(--bg2);border:1px solid var(--brd);border-radius:8px;overflow:hidden;margin:10px 0}
.bud-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid var(--brd);font-size:12px}
.bud-row:last-child{border-bottom:none}
.bud-row.sub{color:var(--tx2);font-size:11px}
.bud-row.total{font-weight:700;color:var(--ac);background:rgba(79,126,248,.08);border-top:1px solid var(--ac)}
.bud-row.warn{color:var(--am)}
.charts-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0}
.chart-card{background:var(--bg2);border:1px solid var(--brd);border-radius:8px;padding:12px}
.chart-card-title{font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:8px;text-align:center}
.gosi-info{background:var(--bg3);border:1px solid var(--brd);border-radius:6px;padding:8px 12px;margin-top:8px;font-size:11px;color:var(--tx2)}
.ja-toggle{background:var(--bg3);border:1px solid var(--brd);border-radius:6px;padding:7px 11px;width:100%;text-align:right;font-size:11px;color:var(--tx2);cursor:pointer;font-family:inherit;margin:8px 0;display:flex;align-items:center;justify-content:space-between}
.ja-toggle:hover{border-color:var(--ac);color:var(--ac)}
.ja-panel{display:none;padding:10px;background:var(--bg3);border:1px solid var(--brd);border-radius:0 0 6px 6px;margin-top:-1px;margin-bottom:8px}
.ja-panel.open{display:block}
@media(max-width:600px){.bud-grid{grid-template-columns:1fr}.charts-row{grid-template-columns:1fr}}


@media(max-width:700px){
  /* Sidebar becomes a slide-in overlay so content always gets full width */
  #sb{position:fixed;top:0;inset-inline-start:0;height:100vh;width:var(--sw);max-width:85vw;z-index:200;box-shadow:2px 0 16px rgba(0,0,0,.5)}
  #sb.closed{width:0;box-shadow:none}
  .sb-inner{width:var(--sw);max-width:85vw}
  #main{width:100%;min-width:0}
  #ct{padding:12px}
  .sb-top h1{font-size:13px}
  .ni span{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ni{padding:7px 9px;gap:8px}
  .ni i{font-size:14px}
  .fr{grid-template-columns:1fr!important}
  .tg{grid-template-columns:1fr!important}
  .mg{grid-template-columns:1fr!important}
  .mtr{grid-template-columns:1fr 1fr!important}
  .bud-grid{grid-template-columns:1fr!important}
  .charts-row{grid-template-columns:1fr!important}
  #sb-ovl{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:150;display:none}
  #sb-ovl.show{display:block}
}
@media(max-width:440px){
  .nav-item span{max-width:52px;font-size:9px}
  .bud-grid{grid-template-columns:1fr}
  table th,table td{padding:4px 5px;font-size:9px}
}
.dl-btns{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}
.pdf-btn{background:#e53e3e;color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-family:inherit;transition:all .15s;font-weight:600}
.pdf-btn:hover{background:#c53030}
.xls-btn{background:#1a7a4a;color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-family:inherit;transition:all .15s;font-weight:600}
.xls-btn:hover{background:#145c37}
</style>
</head>
<body>
<div id="sb"><div class="sb-inner">
  <div class="brand">
    <div class="brand-ic"><i class="ti ti-building-community"></i></div>

      <button onclick="sendAdvChat('${advKey}','${hid}')"><i class="ti ti-send"></i></button>

function clearChat(hid,advKey){
  chatHistories[hid]=[];
  renderAdvisor(advKey);
}

function scrollChat(advKey){
  const el=document.getElementById('ca_'+advKey);
  if(el)setTimeout(()=>el.scrollTop=el.scrollHeight,50);
}

async function sendAdvMsg(advKey,hid,msg){
  const inp=document.getElementById('ci_'+advKey);
  if(inp)inp.value=msg;
  await sendAdvChat(advKey,hid);
}

async function sendAdvChat(advKey,hid){
  const inp=document.getElementById('ci_'+advKey);
  const msg=inp?.value?.trim();
  if(!msg)return;
  inp.value='';
  const adv=ADVISORS[advKey];
  const d=adv[lang];
  const area=document.getElementById('ca_'+advKey);
  if(!chatHistories[hid])chatHistories[hid]=[];
  area.innerHTML+=`<div class="msg u">${msg}</div>`;
  const tid='tm_'+Date.now();
  area.innerHTML+=`<div class="msg a" id="${tid}"><div class="ml">AI</div><span class="thk">...</span></div>`;
  area.scrollTop=area.scrollHeight;
  chatHistories[hid].push({role:'user',content:msg});
  try{
    const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:600,stream:true,system:d.sys,messages:chatHistories[hid]})});
    const el=document.getElementById(tid);
    let full='';
    const reader=r.body.getReader();
    const dec=new TextDecoder();
    while(true){
      const{done,value}=await reader.read();
      if(done)break;
      const chunk=dec.decode(value);
      for(const line of chunk.split('\n')){
        if(!line.startsWith('data:'))continue;
        const raw=line.slice(5).trim();
        if(raw==='[DONE]')break;
        try{
          const j=JSON.parse(raw);
          if(j.type==='content_block_delta'&&j.delta?.text){
            full+=j.delta.text;
            if(el)el.innerHTML=`<div class="ml">AI</div>${full.replace(/\n/g,'<br>')}`;
            area.scrollTop=area.scrollHeight;
          }
        }catch{}
      }
    }
    if(full){
      chatHistories[hid].push({role:'assistant',content:full});
      const el2=document.getElementById(tid);
      if(el2){
        const btn=document.createElement('button');
        btn.className='adv-pdf-btn';
        btn.innerHTML='<i class="ti ti-file-type-pdf"></i> PDF';
        const capFull=full,capAdv=advKey;
        btn.onclick=function(){printAdvPDF(capAdv,capFull);};
        el2.appendChild(btn);
      }
    }
  }catch(e){
    const el=document.getElementById(tid);
    if(el)el.innerHTML=`<div class="ml">AI</div>${lang==='ar'?'حدث خطأ، يرجى المحاولة مجدداً.':'Error, please try again.'}`;
  }
  area.scrollTop=area.scrollHeight;
}

  }).join('');
  var pdfRow=pdfKey?('<div class="dl-btns" style="margin-top:12px">'
    +'<button class="pdf-btn" onclick="printGenericPDF(\''+pdfKey+'\',\''+title+'\')"><i class="ti ti-file-type-pdf"></i> '

}

async function genJD(){
  var t=document.getElementById('jd-t')?.value.trim()||'';
  var dep=document.getElementById('jd-d')?.value.trim()||'';
  var lv=document.getElementById('jd-l')?.value||'';
  var ind=document.getElementById('jd-i')?.value||'';

  var rpts=document.getElementById('jd-rpts')?.value||'';
  var res_=document.getElementById('jd-res')?.value.trim()||'';
  var dec=document.getElementById('jd-dec')?.value.trim()||'';
  var ch=document.getElementById('jd-ch')?.value.trim()||'';
  var out=document.getElementById('jd-out');
  var isAr=lang==='ar';
  out.style.display='block';
  out.innerHTML='<span class="thk">'+(isAr?'جارٍ الإنشاء...':'Generating...')+'</span>';
  var jaLines=[];
  if(repto)jaLines.push((isAr?'- مرفوع إليه: ':'- Reports To: ')+repto);

function getGosiRates(nat,sysType,calcDate){
  // Returns {empRate, pensionRate, saned, hazard, empDeduct}
  // nat: 'sa'=Saudi, 'ex'=Expat
  // sysType: 'old'=9% fixed, 'new'=progressive
  // calcDate: for progressive rate lookup
  const SANED_EMP=0.0075;  // employer 0.75%
  const HAZARD=0.02;       // occupational hazard employer 2% (all)
  if(nat==='ex'){
    return{empRate:HAZARD,pensionRate:0,saned:0,hazard:HAZARD,empDeduct:0,
      label:'أخطار مهنية 2%',deductLabel:'لا استقطاع (غير سعودي)'};
  }
  // Saudi: pensions + saned + hazard
  let pensionEmp=0.09; // default old system
  if(sysType==='new'){
    const d=new Date(calcDate||new Date());
    if(d>=new Date('2028-07-01'))pensionEmp=0.11;
    else if(d>=new Date('2027-07-01'))pensionEmp=0.105;
    else if(d>=new Date('2026-07-01'))pensionEmp=0.10;
    else if(d>=new Date('2025-07-01'))pensionEmp=0.095;
    else pensionEmp=0.09;
  }
  const empRate=pensionEmp+SANED_EMP+HAZARD;
  const deductRate=pensionEmp+SANED_EMP; // employee pays pensions+saned only
  const label='معاشات '+(pensionEmp*100)+'% + ساند 0.75% + أخطار 2% = '+(empRate*100).toFixed(2)+'%';
  const deductLabel='موظف: معاشات '+(pensionEmp*100)+'% + ساند 0.75% = '+(deductRate*100)+'%';
  return{empRate,pensionRate:pensionEmp,saned:SANED_EMP,hazard:HAZARD,empDeduct:deductRate,label,deductLabel};
}

function calcEOSB(basicSalary,joinDate,calcDate){
  if(!joinDate||!calcDate||!basicSalary)return{total:0,months:0,years:0};
  const j=new Date(joinDate),c=new Date(calcDate);
  if(c<=j)return{total:0,months:0,years:0};
  const totalDays=(c-j)/(1000*60*60*24);
  const totalMonths=totalDays/30.4375;
  const years=Math.floor(totalMonths/12);
  const remMonths=totalMonths%12;
  if(totalMonths<24)return{total:0,months:totalMonths,years:years};
  let eosb=0;
  if(years<=5){
    eosb=(years+remMonths/12)*0.5*basicSalary;
  } else {
    eosb=(5*0.5*basicSalary)+((years-5+remMonths/12)*basicSalary);
  }
  return{total:Math.round(eosb),months:totalMonths,years:years};
}

function budCalc(){
  const basic=parseFloat(document.getElementById('b-basic')?.value)||0;
  const resultsEl=document.getElementById('bud-results');
  if(!basic){if(resultsEl)resultsEl.style.display='none';return;}
  const isAr=lang==='ar';
  const nat=document.getElementById('b-nat')?.value||'sa';
  const gsys=document.getElementById('b-gsys')?.value||'old';
  const ctype=document.getElementById('b-ctype')?.value||'indef';
  const joinDate=document.getElementById('b-join')?.value||'';
  const endDate=document.getElementById('b-end')?.value||'';
  const calcDate=document.getElementById('b-calc')?.value||new Date().toISOString().slice(0,10);

  if(document.getElementById('b-endrow'))document.getElementById('b-endrow').style.display=ctype==='fixed'?'block':'none';
  const isEx=nat==='ex';
  ['b-ticketrow','b-iqamarow','b-wprow'].forEach(function(id){
    const el=document.getElementById(id);if(el)el.style.display=isEx?'block':'none';
  });
  if(document.getElementById('b-gsys'))document.getElementById('b-gsys').closest('.bud-field').style.display=isEx?'none':'block';

  // GOSI rates
  const gosi=getGosiRates(nat,gsys,calcDate);
  const gosiInfoEl=document.getElementById('gosi-info-box');
  if(gosiInfoEl)gosiInfoEl.innerHTML='<strong>'+(isAr?'تأمينات صاحب العمل:':'Employer GOSI:')+'</strong> '
    +gosi.label+'<br><small style="color:var(--tx3)">'+gosi.deductLabel+'</small>';

  const housing=parseFloat(document.getElementById('b-housing')?.value)||0;
  const trans=parseFloat(document.getElementById('b-trans')?.value)||0;
  const customTotal=_budCustom.reduce(function(s,r){return s+r.amt;},0);
  const phone=parseFloat(document.getElementById('b-phone')?.value)||0;
  const car=parseFloat(document.getElementById('b-car')?.value)||0;
  const medAnnual=parseFloat(document.getElementById('b-medical')?.value)||0;
  const ticketAnnual=isEx?(parseFloat(document.getElementById('b-ticket')?.value)||0):0;
  const iqamaAnnual=isEx?(parseFloat(document.getElementById('b-iqama')?.value)||650):0;
  const wpAnnual=isEx?(parseFloat(document.getElementById('b-wp')?.value)||1200):0;
  const trainPct=(parseFloat(document.getElementById('b-train')?.value)||2)/100;
  const bonusPct=(parseFloat(document.getElementById('b-bonus')?.value)||0)/100;
  const recruitOne=parseFloat(document.getElementById('b-recruit')?.value)||0;

  const grossSalary=basic+housing+trans+customTotal;
  // GOSI base: capped at 45,000 SAR
  const gosiBase=Math.min(basic+housing+trans,45000);
  const gosiEmpAmt=Math.round(gosiBase*gosi.empRate);
  const gosiEmpDeductAmt=Math.round(gosiBase*gosi.empDeduct); // shown for reference

  const medM=Math.round(medAnnual/12);
  const ticketM=Math.round(ticketAnnual/12);
  const iqamaM=Math.round(iqamaAnnual/12);
  const wpM=Math.round(wpAnnual/12);
  const annualSalary=grossSalary*12;
  const trainM=Math.round(annualSalary*trainPct/12);
  const bonusM=Math.round(annualSalary*bonusPct/12);
  const recruitM=Math.round(recruitOne/12);
  const vacDays=5; // simplified
  const vacM=Math.round(basic/30*1.75);
  const kindBens=phone+car;

  const eosbData=calcEOSB(basic,joinDate,calcDate);
  const eosbM=eosbData.months>0?Math.round(eosbData.total/Math.max(eosbData.months,1)):0;

  let termComp=0;
  if(ctype==='fixed'&&endDate){
    const now=new Date(calcDate),end=new Date(endDate);
    const remM=Math.max((end-now)/(1000*60*60*24*30.4375),0);
    termComp=Math.round(remM*grossSalary);
  } else {
    const twoM=grossSalary*2;
    const fifteenD=Math.max(Math.round(basic/30*15*Math.max(eosbData.years,1)),basic*2);
    termComp=Math.max(twoM,fifteenD,basic);
  }

  const monthlyTotal=grossSalary+kindBens+gosiEmpAmt+medM+ticketM+iqamaM+wpM+trainM+bonusM+vacM+recruitM+eosbM;
  const annualTotal=monthlyTotal*12;

  const fmt=function(n){return Math.round(n||0).toLocaleString('ar-SA');};

  if(document.getElementById('b-total-m'))document.getElementById('b-total-m').textContent=fmt(monthlyTotal)+' ر.س';
  if(document.getElementById('b-total-a'))document.getElementById('b-total-a').textContent=(isAr?'سنوياً: ':'Annual: ')+fmt(annualTotal)+' ر.س | '+(isAr?'استقطاع الموظف: ':'Employee Deduction: ')+fmt(gosiEmpDeductAmt)+' ر.س';

  const bd=[
    {l:isAr?'الراتب الأساسي':'Basic Salary',v:basic,c:''},
    {l:isAr?'بدل السكن':'Housing',v:housing,c:'sub'},
    {l:isAr?'بدل المواصلات':'Transport',v:trans,c:'sub'},
  ].concat(_budCustom.map(function(r){return{l:r.name,v:r.amt,c:'sub'};})).concat([
    {l:isAr?'مزايا عينية (هاتف+سيارة)':'Benefits in Kind',v:kindBens,c:'sub'},
    {l:isAr?'إجمالي الراتب الشامل':'Gross Package',v:grossSalary+kindBens,c:'total'},
    {l:(isAr?'تأمينات صاحب العمل: ':'GOSI Employer: ')+gosi.label,v:gosiEmpAmt,c:''},
    {l:isAr?'تأمين طبي':'Medical Insurance',v:medM,c:''},
  ]).concat(isEx?[
    {l:isAr?'تجديد إقامة':'Iqama Renewal',v:iqamaM,c:''},
    {l:isAr?'رخصة عمل':'Work Permit',v:wpM,c:''},
    {l:isAr?'تذكرة سنوية':'Annual Ticket',v:ticketM,c:''},
  ]:[]).concat([
    {l:isAr?'ميزانية تدريب':'Training Budget',v:trainM,c:''},
    {l:isAr?'مخصص مكافأة سنوية':'Bonus Provision',v:bonusM,c:''},
    {l:isAr?'مخصص إجازة':'Leave Provision',v:vacM,c:''},
    {l:isAr?'تكلفة استقطاب (موزّعة)':'Recruitment Cost',v:recruitM,c:''},
    {l:isAr?'مخصص مكافأة نهاية الخدمة':'EOSB Monthly Provision',v:eosbM,c:''},
    {l:isAr?'إجمالي التكلفة الشهرية':'TOTAL MONTHLY COST',v:monthlyTotal,c:'total'},
  ]).filter(function(r){return r.v>0;});

  const bdEl=document.getElementById('bud-breakdown');
  if(bdEl)bdEl.innerHTML=bd.map(function(r){
    return '<div class="bud-row '+r.c+'"><span>'+r.l+'</span><span>'+fmt(r.v)+' ر.س</span></div>';
  }).join('');

  const liabEl=document.getElementById('bud-liability');
  if(liabEl)liabEl.innerHTML=[
    {l:isAr?'مكافأة نهاية الخدمة المتراكمة':'EOSB Accrued',v:eosbData.total,c:''},
    {l:(isAr?'مدة الخدمة: '+Math.floor(eosbData.months/12)+' سنة '+Math.round(eosbData.months%12)+' شهر':'Service: '+Math.floor(eosbData.months/12)+'y '+Math.round(eosbData.months%12)+'m'),v:null,c:'sub'},
    {l:isAr?'تعويض الإنهاء غير المشروع (تقدير)':'Wrongful Termination Est.',v:termComp,c:'warn'},
    {l:isAr?'إجمالي الالتزامات':'Total Liabilities',v:eosbData.total+termComp,c:'total'},
  ].map(function(r){
    return r.v!==null?'<div class="bud-row '+r.c+'"><span>'+r.l+'</span><span>'+fmt(r.v)+' ر.س</span></div>'
      :'<div class="bud-row '+r.c+'"><span>'+r.l+'</span></div>';
  }).join('');

  if(resultsEl)resultsEl.style.display='block';
  window._lastBudget={basic,housing,trans,customTotal,kindBens,gosiEmpAmt,gosiEmpDeductAmt,medM,ticketM,iqamaM,wpM,trainM,bonusM,vacM,recruitM,eosbM,monthlyTotal,annualTotal,eosbData,termComp,isEx,bd,isAr,nat,gsys,joinDate,calcDate,gosi};

  setTimeout(function(){
    drawBudCharts(basic,housing+trans+customTotal,kindBens,gosiEmpAmt,medM+(isEx?(iqamaM+wpM+ticketM):0),trainM+bonusM+vacM+recruitM,eosbM,basic,joinDate,isAr);
  },100);
}

function drawBudCharts(basic,allowances,kind,gosi,insurance,other,eosb,basicSal,joinDate,isAr){
  const colors=['#4f7ef8','#2dd4bf','#f472b6','#f5a623','#22c778','#a78bfa','#f04e4e'];
  const rawLabels=isAr?['أساسي','بدلات','مزايا عينية','تأمينات','تأمين طبي+أخرى','مخصصات','مكافأة ن.خ.']:['Basic','Allowances','Benefits in Kind','GOSI','Insurance+','Provisions','EOSB'];
  const rawData=[basic,allowances,kind,gosi,insurance,other,eosb];
  const filtered=rawData.reduce(function(acc,v,i){if(v>0)acc.push({v,l:rawLabels[i],c:colors[i]});return acc;},[]);
  if(_budCharts.pie){_budCharts.pie.destroy();_budCharts.pie=null;}
  if(_budCharts.bar){_budCharts.bar.destroy();_budCharts.bar=null;}
  if(_budCharts.line){_budCharts.line.destroy();_budCharts.line=null;}
  const opts={plugins:{legend:{labels:{color:'#8b97b0',font:{size:9},boxWidth:10}}},maintainAspectRatio:false};
  const cpie=document.getElementById('chart-pie');
  if(cpie&&typeof Chart!=='undefined')_budCharts.pie=new Chart(cpie,{type:'doughnut',data:{labels:filtered.map(function(f){return f.l;}),datasets:[{data:filtered.map(function(f){return f.v;}),backgroundColor:filtered.map(function(f){return f.c;}),borderWidth:2,borderColor:'#161b26'}]},options:opts});
  const cbar=document.getElementById('chart-bar');
  if(cbar&&typeof Chart!=='undefined')_budCharts.bar=new Chart(cbar,{type:'bar',data:{labels:filtered.map(function(f){return f.l;}),datasets:[{label:isAr?'ر.س/شهر':'SAR/mo',data:filtered.map(function(f){return f.v;}),backgroundColor:filtered.map(function(f){return f.c;}),borderRadius:4}]},options:{indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#8b97b0',font:{size:9}},grid:{color:'#2a3347'}},y:{ticks:{color:'#8b97b0',font:{size:9}},grid:{display:false}}},maintainAspectRatio:false}});
  const cline=document.getElementById('chart-line');
  if(cline&&typeof Chart!=='undefined'){
    const pts=[];
    for(let m2=0;m2<=60;m2++){
      const d=new Date(joinDate||new Date().toISOString().slice(0,10));
      d.setMonth(d.getMonth()+m2);
      pts.push(calcEOSB(basicSal,joinDate||new Date().toISOString().slice(0,10),d.toISOString().slice(0,10)).total);
    }
    const mLbls=Array.from({length:61},function(_,i){return i%12===0?(isAr?'س':'Y')+(i/12):'';});
    _budCharts.line=new Chart(cline,{type:'line',data:{labels:mLbls,datasets:[{label:isAr?'مكافأة ن.خ. (ر.س)':'EOSB (SAR)',data:pts,borderColor:'#4f7ef8',backgroundColor:'rgba(79,126,248,0.15)',fill:true,tension:0.4,pointRadius:2}]},options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#8b97b0',font:{size:8}},grid:{color:'#2a3347'}},y:{ticks:{color:'#8b97b0',font:{size:8},callback:function(v){return(v/1000).toFixed(0)+'k';}},grid:{color:'#2a3347'}}},maintainAspectRatio:false}});
  }
}

/* ─── printScorePDF — with 3 inline SVG charts ─────────── */
function printScorePDF(){
  var d=window._scoreData;
  if(!d){alert(lang==='ar'?'افتح صفحة بطاقة الأداء أولاً':'Open Scorecard page first');return;}
  var isAr=d.isAr, sl=d.sl, rows=d.rows;
  var gr=rows.filter(function(r){return r[5]==='gr';}).length;
  var am=rows.filter(function(r){return r[5]==='am';}).length;
  var dr=rows.filter(function(r){return r[5]==='dr';}).length;
  var tot=rows.length;
  var score=Math.round((gr*100+am*50)/tot);

  /* SVG CHART 1 — Status Donut */
  function arc(cx,cy,r,start,end,color){
    var s=start*Math.PI/180, e=end*Math.PI/180;
    var x1=cx+r*Math.cos(s),y1=cy+r*Math.sin(s);
    var x2=cx+r*Math.cos(e),y2=cy+r*Math.sin(e);
    var lg=(end-start)>180?1:0;
    return '<path d="M'+cx+','+cy+' L'+x1+','+y1+' A'+r+','+r+' 0 '+lg+',1 '+x2+','+y2+' Z" fill="'+color+'"/>';
  }
  var a1=(gr/tot)*360, a2=(am/tot)*360, a3=(dr/tot)*360;
  var donut='<svg width="140" height="140" viewBox="-70 -70 140 140">'
    +arc(0,0,55,-90,-90+a1,'#38a169')
    +arc(0,0,55,-90+a1,-90+a1+a2,'#d69e2e')
    +arc(0,0,55,-90+a1+a2,270,'#e53e3e')
    +'<circle cx="0" cy="0" r="32" fill="white"/>'
    +'<text x="0" y="6" text-anchor="middle" font-size="14" font-weight="700" fill="#2d3748">'+score+'%</text>'
    +'</svg>';

  /* SVG CHART 2 — Perspective bars */
  var persp={};
  rows.forEach(function(r){var p=r[0];if(!persp[p])persp[p]={gr:0,am:0,dr:0,tot:0};persp[p][r[5]]++;persp[p].tot++;});
  var perspKeys=Object.keys(persp);
  var barH=perspKeys.length*30+20;
  var bars='<svg width="220" height="'+barH+'" viewBox="0 0 220 '+barH+'">';
  perspKeys.forEach(function(p,i){
    var pd=persp[p];
    var sc2=Math.round((pd.gr*100+pd.am*50)/pd.tot);
    var w=Math.round(sc2*1.6);
    var col=sc2>=80?'#38a169':sc2>=50?'#d69e2e':'#e53e3e';
    var y=10+i*30;
    bars+='<rect x="0" y="'+y+'" width="160" height="18" rx="3" fill="#f0f4ff"/>';
    bars+='<rect x="0" y="'+y+'" width="'+w+'" height="18" rx="3" fill="'+col+'"/>';
    bars+='<text x="5" y="'+(y+13)+'" font-size="9" fill="white" font-weight="600">'+p+'</text>';
    bars+='<text x="165" y="'+(y+13)+'" font-size="9" fill="#333">'+sc2+'%</text>';
  });
  bars+='</svg>';

  /* SVG CHART 3 — KPI Status grouped bar */
  var kpiBar='<svg width="220" height="120" viewBox="0 0 220 120">';
  var bw=40,gap=10;
  var vals=[{l:isAr?'في المسار':'On Track',v:gr,c:'#38a169'},{l:isAr?'للمراقبة':'Monitor',v:am,c:'#d69e2e'},{l:isAr?'في خطر':'At Risk',v:dr,c:'#e53e3e'}];
  var mx=Math.max(gr,am,dr,1);
  vals.forEach(function(bar,i){
    var bh=Math.round((bar.v/mx)*80);
    var x=10+i*(bw+gap);
    kpiBar+='<rect x="'+x+'" y="'+(90-bh)+'" width="'+bw+'" height="'+bh+'" rx="4" fill="'+bar.c+'"/>';
    kpiBar+='<text x="'+(x+bw/2)+'" y="86" text-anchor="middle" font-size="8" fill="#333">'+bar.l+'</text>';
    kpiBar+='<text x="'+(x+bw/2)+'" y="'+(88-bh)+'" text-anchor="middle" font-size="11" font-weight="700" fill="'+bar.c+'">'+bar.v+'</text>';
  });
  kpiBar+='<line x1="0" y1="90" x2="220" y2="90" stroke="#ddd" stroke-width="1"/></svg>';

<script>
if ('serviceWorker' in navigator) {
  var swRefreshing = false;
  // When the controlling worker changes, reload once to load fresh content.
  navigator.serviceWorker.addEventListener('controllerchange', function () {
    if (swRefreshing) return;
    swRefreshing = true;
    window.location.reload();
  });
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('./sw.js').then(function (reg) {
      // Force a check for a new sw.js on every load (mobile PWAs delay this otherwise).
      reg.update();
      // If a worker is already waiting, activate it now.
      if (reg.waiting) reg.waiting.postMessage('SKIP_WAITING');
      // Watch for a newly found worker and activate it as soon as it is installed.
      reg.addEventListener('updatefound', function () {
        var nw = reg.installing;
        if (!nw) return;
        nw.addEventListener('statechange', function () {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) {
            nw.postMessage('SKIP_WAITING');
          }
        });
      });
    }).catch(function () {});
    // Re-check for updates whenever the app is brought back to the foreground.
    document.addEventListener('visibilitychange', function () {
      if (document.visibilityState === 'visible') {
        navigator.serviceWorker.getRegistration().then(function (reg) {
          if (reg) reg.update();
        });
      }
    });
  });
}
